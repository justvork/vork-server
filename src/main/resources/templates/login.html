<!DOCTYPE html>
<html lang="en" data-bs-theme="dark" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Vork</title>
    <link rel="icon" type="image/png" href="/images/Vork-Faviconx128.png" th:href="@{/images/Vork-Faviconx128.png}">
    <link rel="stylesheet" href="/css/tailwind.css" th:href="@{/css/tailwind.css}">
    <link rel="stylesheet" href="/packages/npm.fortawesome/fontawesome-free/current/css/all.min.css" th:href="@{/packages/npm.fortawesome/fontawesome-free/current/css/all.min.css}">
    <link rel="stylesheet" href="/css/vork.css" th:href="@{/css/vork.css}">
    <link rel="stylesheet" href="/css/login-page.css" th:href="@{/css/login-page.css}">
</head>
<body class="min-h-screen bg-zinc-950 flex items-center justify-center p-4">

    <div class="login-card w-full max-w-sm">
        <div class="bg-zinc-900 border border-zinc-800 rounded-xl shadow-2xl p-8">

            <!-- Header -->
            <div class="text-center mb-8">
                <img src="/images/Vork-Faviconx128.png" th:src="@{/images/Vork-Faviconx128.png}" alt="Vork Logo" class="w-14 h-14 mx-auto mb-3">
                <h1 class="text-2xl font-bold text-zinc-100 tracking-tight mb-1">Vork</h1>
                <p class="text-sm"><span class="crt-tagline">&gt; What shall we build today?</span><span class="terminal-cursor"></span></p>
            </div>

            <form method="POST" action="/login" th:action="@{/login}">
                <!-- Error message -->
                <div th:if="${param.error}"
                     class="flex items-center gap-2 bg-red-950/50 border border-red-800/60 text-red-400 rounded-lg px-3 py-2.5 mb-4 text-sm">
                    <i class="fa-solid fa-circle-exclamation flex-shrink-0"></i>
                    <span>Invalid username or password</span>
                </div>

                <!-- Logout message -->
                <div th:if="${param.logout}"
                     class="flex items-center gap-2 bg-teal-950/50 border border-teal-800/60 text-teal-400 rounded-lg px-3 py-2.5 mb-4 text-sm">
                    <i class="fa-solid fa-check-circle flex-shrink-0"></i>
                    <span>You have been logged out successfully</span>
                </div>

                <!-- Username -->
                <div class="mb-4">
                    <label for="username" class="block text-sm font-medium text-zinc-300 mb-1.5">
                        <i class="fa-solid fa-user mr-1.5 text-zinc-500"></i>Username
                    </label>
                    <input type="text" id="username" name="username" required autofocus
                           placeholder="Enter your username"
                           class="w-full bg-zinc-950 border border-zinc-700 text-zinc-100 rounded-lg px-3 py-2.5 text-sm
                                  placeholder:text-zinc-600 focus:outline-none focus:border-[#fdaa02] focus:ring-2 focus:ring-[#fdaa02]/25 transition-colors">
                </div>

                <!-- Password -->
                <div class="mb-4">
                    <label for="password" class="block text-sm font-medium text-zinc-300 mb-1.5">
                        <i class="fa-solid fa-lock mr-1.5 text-zinc-500"></i>Password
                    </label>
                    <input type="password" id="password" name="password" required
                           placeholder="Enter your password"
                           class="w-full bg-zinc-950 border border-zinc-700 text-zinc-100 rounded-lg px-3 py-2.5 text-sm
                                  placeholder:text-zinc-600 focus:outline-none focus:border-[#fdaa02] focus:ring-2 focus:ring-[#fdaa02]/25 transition-colors">
                </div>

                <!-- CSRF -->
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <!-- Submit -->
                <button type="submit"
                        class="w-full bg-[#fdaa02] hover:bg-[#e89a02] active:bg-[#cc8601] text-black font-semibold
                               rounded-lg px-4 py-2.5 text-sm transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[#fdaa02]">
                    <i class="fa-solid fa-sign-in-alt mr-2"></i>Sign In
                </button>
            </form>

            <!-- Footer -->
            <div class="mt-6 pt-5 border-t border-zinc-800 text-center">
                <p class="text-xs text-zinc-600">
                    <i class="fa-solid fa-shield mr-1"></i>Secure authentication required
                </p>
            </div>
        </div>
    </div>

</body>
</html>
