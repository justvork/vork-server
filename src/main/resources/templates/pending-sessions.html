<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pending Input — Vork</title>
    <link rel="icon" type="image/png" href="/images/Vork-Faviconx128.png" th:href="@{/images/Vork-Faviconx128.png}">
    <link rel="stylesheet" href="/css/tailwind.css" th:href="@{/css/tailwind.css}">
    <link rel="stylesheet" href="/packages/npm.fortawesome/fontawesome-free/current/css/all.min.css" th:href="@{/packages/npm.fortawesome/fontawesome-free/current/css/all.min.css}">
    <link rel="stylesheet" href="/css/vork.css" th:href="@{/css/vork.css}">
    <link rel="stylesheet" href="/packages/npm.fortawesome/fontawesome-free/current/css/all.min.css" th:href="@{/packages/npm.fortawesome/fontawesome-free/current/css/all.min.css}">
    <link rel="stylesheet" href="/css/pending-sessions.css" th:href="@{/css/pending-sessions.css}">
</head>
<body class="bg-zinc-950 text-zinc-100">
<div th:replace="~{fragments/header :: header}"></div>

<div class="container py-4" style="max-width: 860px;">

    <div class="mb-4">
        <div>
            <h2 class="mb-0">
                <i class="fa-solid fa-inbox me-2 text-warning"></i>Pending Input
            </h2>
            <p class="text-muted small mb-0">Sessions waiting for your response</p>
        </div>
    </div>

    <!-- Loading state -->
    <div id="loading-state" class="text-center py-5">
        <div class="spinner-border text-secondary" role="status">
            <span class="visually-hidden">Loading…</span>
        </div>
        <div class="text-muted mt-2 small">Checking for pending sessions…</div>
    </div>

    <!-- Empty state -->
    <div id="empty-state" class="d-none text-center py-5">
        <i class="fa-solid fa-circle-check fa-3x text-success mb-3 d-block"></i>
        <h5 class="text-muted">All clear</h5>
        <p class="text-muted small">No sessions are waiting for your input.</p>
    </div>

    <!-- Sessions table -->
    <div id="sessions-table-wrapper" class="d-none">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0 pending-table">
                <thead>
                    <tr>
                        <th>Session</th>
                        <th>Origin</th>
                        <th>Tool</th>
                        <th>Waiting since</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="sessions-tbody"></tbody>
            </table>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<script src="/js/pending-sessions.js" th:src="@{/js/pending-sessions.js}"></script>
</body>
</html>
