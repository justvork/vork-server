<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pending Input — Vork</title>
    <link rel="icon" type="image/png" href="/images/Vork-Faviconx128.png" th:href="@{/images/Vork-Faviconx128.png}">
    <link rel="stylesheet" href="/css/tailwind.css" th:href="@{/css/tailwind.css}">
    <link rel="stylesheet" href="/packages/npm.fortawesome/fontawesome-free/current/css/all.min.css" th:href="@{/packages/npm.fortawesome/fontawesome-free/current/css/all.min.css}">
    <link rel="stylesheet" href="/css/vork.css" th:href="@{/css/vork.css}">
    <link rel="stylesheet" href="/css/pending-sessions.css" th:href="@{/css/pending-sessions.css}">
</head>
<body class="bg-zinc-950 text-zinc-100">
<div th:replace="~{fragments/header :: header}"></div>

<div class="vork-page-shell py-4">

    <div class="vork-page-header">
        <div>
            <h2 class="flex items-center gap-2 text-2xl font-bold text-zinc-100">
                <i class="fa-solid fa-inbox text-amber-400"></i>Pending Input
            </h2>
            <p class="vork-page-subtitle">Sessions waiting for your response</p>
        </div>
        <div class="vork-page-header-actions">
            <button class="rounded-lg border border-zinc-600 px-3 py-1.5 text-xs font-medium text-zinc-200 transition-colors hover:bg-zinc-800" onclick="window.location.reload()">
                <i class="fa-solid fa-rotate-right mr-1"></i>Refresh
            </button>
        </div>
    </div>

    <!-- Loading state -->
    <div id="loading-state" class="rounded-xl border border-zinc-800 bg-zinc-900">
        <div class="vork-empty-state-card">
            <div class="h-6 w-6 animate-spin rounded-full border-2 border-zinc-600 border-t-zinc-300" role="status" aria-label="Loading"></div>
            <span class="sr-only">Loading...</span>
            <p class="vork-empty-hint mt-2">Checking for pending sessions…</p>
        </div>
    </div>

    <!-- Empty state -->
    <div id="empty-state" class="hidden rounded-xl border border-zinc-800 bg-zinc-900">
        <div class="vork-empty-state-card">
            <i class="fa-solid fa-circle-check vork-empty-icon text-emerald-400"></i>
            <p class="vork-empty-title">All clear</p>
            <p class="vork-empty-hint">No sessions are waiting for your input.</p>
        </div>
    </div>

    <!-- Sessions table -->
    <div id="sessions-table-wrapper" class="hidden">
        <div class="rounded-xl border border-zinc-800 bg-zinc-900">
                <div class="overflow-x-auto">
                    <table class="min-w-full pending-table text-left text-sm text-zinc-200">
                        <thead>
                            <tr>
                                <th class="px-3 py-2">Session</th>
                                <th class="px-3 py-2">Origin</th>
                                <th class="px-3 py-2">Tool</th>
                                <th class="px-3 py-2">Waiting since</th>
                                <th class="px-3 py-2"></th>
                            </tr>
                        </thead>
                        <tbody id="sessions-tbody"></tbody>
                    </table>
                </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<script src="/js/pending-sessions.js" th:src="@{/js/pending-sessions.js}"></script>
</body>
</html>
