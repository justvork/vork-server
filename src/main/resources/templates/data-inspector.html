<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Inspector — Vork</title>
    <link rel="icon" type="image/png" href="/images/Vork-Faviconx128.png" th:href="@{/images/Vork-Faviconx128.png}">
    <link rel="stylesheet" href="/css/tailwind.css" th:href="@{/css/tailwind.css}">
    <link rel="stylesheet" href="/packages/npm.fortawesome/fontawesome-free/current/css/all.min.css" th:href="@{/packages/npm.fortawesome/fontawesome-free/current/css/all.min.css}">
    <link rel="stylesheet" href="/css/vork.css" th:href="@{/css/vork.css}">
    <link rel="stylesheet" href="/css/data-inspector.css" th:href="@{/css/data-inspector.css}">
</head>
<body class="bg-zinc-950 text-zinc-100">
<div th:replace="~{fragments/header :: header}"></div>

<!-- Type selector bar -->
<div class="inspector-type-bar">
    <div class="vork-page-shell flex items-center gap-3 py-2">
        <span class="whitespace-nowrap text-xs font-semibold text-zinc-400">
            <i class="fa-solid fa-database mr-1"></i> Record
        </span>
        <select id="type-select" class="inspector-type-select w-full rounded-lg border border-zinc-700 bg-zinc-950 px-3 py-1.5 text-sm text-zinc-100 focus:border-[#fdaa02] focus:outline-none focus:ring-2 focus:ring-[#fdaa02]/25">
            <option value="">— select a record schema —</option>
        </select>
        <div id="type-actions" class="ml-auto hidden items-center gap-2">
            <span id="type-count-badge" class="inline-flex rounded-md border border-zinc-700 bg-zinc-900 px-2 py-0.5 text-xs font-semibold text-zinc-300"></span>
            <button id="create-btn" type="button" class="whitespace-nowrap rounded-lg bg-[#fdaa02] px-3 py-1.5 text-xs font-semibold text-black transition-colors hover:bg-[#e89a02]">
                <i class="fa-solid fa-plus mr-1"></i>Create
            </button>
        </div>
    </div>
</div>

<div class="vork-page-shell py-3">

    <!-- Initial / loading / empty states -->
    <div id="state-initial" class="inspector-state card">
        <div class="vork-empty-state-card">
            <i class="fa-solid fa-database vork-empty-icon"></i>
            <p class="vork-empty-title">Select a record type</p>
            <p class="vork-empty-hint">Choose a schema above to inspect and manage stored data.</p>
        </div>
    </div>

    <div id="state-loading" class="inspector-state hidden card">
        <div class="vork-empty-state-card">
            <div class="h-6 w-6 animate-spin rounded-full border-2 border-zinc-600 border-t-zinc-300" role="status" aria-label="Loading"></div>
            <p class="vork-empty-hint mt-2">Loading data…</p>
        </div>
    </div>

    <div id="state-empty" class="inspector-state hidden card">
        <div class="vork-empty-state-card">
            <i class="fa-solid fa-inbox vork-empty-icon"></i>
            <p class="vork-empty-title">No records found</p>
            <p class="vork-empty-hint">Create your first record for this schema.</p>
            <button class="mt-3 rounded-lg border border-cyan-500/40 px-3 py-1.5 text-xs font-medium text-cyan-300 transition-colors hover:bg-cyan-500/15" onclick="document.getElementById('create-btn').click()">
                <i class="fa-solid fa-plus mr-1"></i>Create your first record
            </button>
        </div>
    </div>

    <div id="state-error" class="inspector-state hidden">
        <div class="rounded-lg border border-rose-700/60 bg-rose-950/40 px-3 py-2 text-sm text-rose-300" id="error-message"></div>
    </div>

    <!-- Data table -->
    <div id="state-table" class="inspector-state hidden">
        <div class="card">
            <div class="card-body">
                <div class="d-flex flex-column flex-md-row gap-2 mb-3 align-items-md-center">
                    <select id="search-query-type" class="form-select form-select-sm max-w-[140px]">
                        <option value="SQL" selected>SQL</option>
                        <option value="MONGO">Mongo JSON</option>
                    </select>
                    <input id="search-query" type="text" class="form-control form-control-sm"
                           placeholder="Search records (e.g. status = 'ACTIVE' AND age >= 2)">
                    <button id="search-apply-btn" type="button" class="btn btn-sm btn-outline-primary text-nowrap">
                        <i class="fa-solid fa-magnifying-glass me-1"></i>Search
                    </button>
                    <button id="search-clear-btn" type="button" class="btn btn-sm btn-outline-secondary text-nowrap">
                        <i class="fa-solid fa-xmark me-1"></i>Clear
                    </button>
                </div>
                <div class="table-responsive">
                    <table class="table table-sm table-hover inspector-table align-middle mb-0">
                        <thead id="table-head"></thead>
                        <tbody id="table-body"></tbody>
                    </table>
                </div>

                <!-- Pagination -->
                <div class="d-flex align-items-center justify-content-between mt-3 px-1">
                    <span id="pagination-info" class="text-muted small"></span>
                    <div class="d-flex gap-2">
                        <button id="prev-btn" type="button" class="btn btn-sm btn-outline-secondary" disabled>
                            <i class="fa-solid fa-chevron-left"></i> Previous
                        </button>
                        <button id="next-btn" type="button" class="btn btn-sm btn-outline-secondary" disabled>
                            Next <i class="fa-solid fa-chevron-right"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>

<!-- Create / Edit modal -->
<div class="modal fade" id="record-modal" tabindex="-1" aria-labelledby="record-modal-label" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="record-modal-label">Create record</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body" id="modal-body">
                <!-- dynamic form rendered here by data-inspector.js -->
            </div>
            <div class="modal-footer">
                <span id="modal-error" class="mr-auto hidden text-xs text-rose-300"></span>
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" id="modal-save-btn" class="btn btn-primary">
                    <i class="fa-solid fa-floppy-disk mr-1"></i>Save
                </button>
            </div>
        </div>
    </div>
</div>

<script src="/js/vork-modal.js" th:src="@{/js/vork-modal.js}"></script>
<script src="/js/data-inspector.js" th:src="@{/js/data-inspector.js}"></script>
</body>
</html>
