<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users - Vork</title>
    <link rel="icon" type="image/png" href="/images/Vork-Faviconx128.png">
    <link rel="stylesheet" href="/css/tailwind.css">
    <link rel="stylesheet" href="/packages/npm.fortawesome/fontawesome-free/current/css/all.min.css">
    <link rel="stylesheet" href="/css/vork.css">
    <link rel="stylesheet" href="/css/settings.css">
</head>
<body class="bg-zinc-950 text-zinc-100">
<div class="container py-5">
    <div th:replace="~{fragments/settings-navigation :: backToSettings}"></div>

    <h2 class="mb-1"><i class="fa-solid fa-users me-2"></i>Users</h2>
    <p class="text-muted mb-4">Manage user accounts and role assignments.</p>

    <div class="card mb-4">
        <div class="card-header">Create User</div>
        <div class="card-body">
            <form id="create-user-form" class="row g-3">
                <div class="col-md-4">
                    <label for="new-username" class="form-label">Username</label>
                    <input id="new-username" name="username" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label for="new-password" class="form-label">Password</label>
                    <input id="new-password" name="password" type="password" class="form-control" minlength="8" required>
                </div>
                <div class="col-md-3">
                    <label for="new-role" class="form-label">Role</label>
                    <select id="new-role" name="role" class="form-select">
                        <option value="USER">USER</option>
                        <option value="ADMIN">ADMIN</option>
                    </select>
                </div>
                <div class="col-md-1 d-flex align-items-end">
                    <button type="submit" class="btn btn-primary w-100">Create</button>
                </div>
            </form>
        </div>
    </div>

    <div class="card" th:if="${users != null and !#lists.isEmpty(users)}">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-dark table-striped align-middle mb-0">
                    <thead>
                    <tr>
                        <th>Username</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody id="users-table-body">
                    <tr th:each="user : ${users}" th:attr="data-username=${user.username}">
                        <td th:text="${user.username}"></td>
                        <td>
                            <select class="form-select form-select-sm user-role-select" th:attr="data-username=${user.username}">
                                <option value="USER" th:selected="${user.role == 'USER'}">USER</option>
                                <option value="ADMIN" th:selected="${user.role == 'ADMIN'}">ADMIN</option>
                            </select>
                        </td>
                        <td>
                            <span th:if="${user.enabled}" class="badge bg-success">Enabled</span>
                            <span th:if="${!user.enabled}" class="badge bg-secondary">Disabled</span>
                        </td>
                        <td class="d-flex gap-2 flex-wrap">
                            <button class="btn btn-sm btn-outline-warning reset-password-btn"
                                    th:attr="data-username=${user.username}">Reset Password</button>
                            <button class="btn btn-sm btn-outline-info toggle-enabled-btn"
                                    th:attr="data-username=${user.username},data-enabled=${user.enabled}"
                                    th:text="${user.enabled ? 'Disable' : 'Enable'}"></button>
                            <button class="btn btn-sm btn-outline-danger delete-user-btn"
                                    th:attr="data-username=${user.username}">Delete</button>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div th:if="${users == null or #lists.isEmpty(users)}" class="card">
        <div class="card-body text-center py-5 text-muted">
            <i class="fa-solid fa-circle-info me-2"></i>No users found.
        </div>
    </div>
</div>
<script src="/js/users.js"></script>
</body>
</html>
