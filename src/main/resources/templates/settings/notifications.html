<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications — Vork</title>
    <link rel="icon" type="image/png" href="/images/Vork-Faviconx128.png" th:href="@{/images/Vork-Faviconx128.png}">
    <link rel="stylesheet" href="/css/tailwind.css" th:href="@{/css/tailwind.css}">
    <link rel="stylesheet" href="/packages/npm.fortawesome/fontawesome-free/current/css/all.min.css" th:href="@{/packages/npm.fortawesome/fontawesome-free/current/css/all.min.css}">
    <link rel="stylesheet" href="/css/vork.css" th:href="@{/css/vork.css}">
    <link rel="stylesheet" href="/css/settings.css" th:href="@{/css/settings.css}">
</head>
<body class="bg-zinc-950 text-zinc-100">
<div th:replace="~{fragments/header :: header}"></div>
<div class="vork-page-shell py-4">
    <div class="vork-page-header">
        <div>
            <h2 class="flex items-center gap-2 text-2xl font-bold text-zinc-100"><i class="fa-solid fa-bell text-[#fdaa02]"></i>Notifications</h2>
            <p class="vork-page-subtitle">Configure notification providers for sending alerts and messages.</p>
        </div>
        <div class="vork-page-header-actions">
            <button class="rounded-lg bg-[#fdaa02] px-3 py-2 text-sm font-semibold text-black transition-colors hover:bg-[#e89a02]" onclick="openAddModal()">
                <i class="fa-solid fa-plus mr-2"></i>Add Provider
            </button>
        </div>
    </div>

    <div class="vork-content-stack">
        <div id="alert-area"></div>

        <div class="rounded-xl border border-zinc-800 bg-zinc-900 p-3">
            <div id="config-list"></div>
            <div id="empty-state" class="vork-empty-state-card hidden">
                <i class="fa-solid fa-bell-slash vork-empty-icon"></i>
                <p class="vork-empty-title">No notification providers configured yet</p>
                <p class="vork-empty-hint">Add a provider to enable outbound alerts and delivery channels.</p>
            </div>
        </div>
    </div>
</div>

<!-- ─── Create / Edit Modal ──────────────────────────────────────────────── -->
<div class="modal fade" id="providerModal" tabindex="-1" aria-labelledby="providerModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="providerModalLabel">Add Notification Provider</h5>
                <button type="button" class="inline-flex h-8 w-8 items-center justify-center rounded-md border border-zinc-700 text-zinc-300 transition-colors hover:bg-zinc-800" data-bs-dismiss="modal" aria-label="Close">×</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="config-id">
                <input type="hidden" id="config-provider-key">

                <!-- Step 1: choose provider type (hidden for edit) -->
                <div id="step-choose">
                    <div class="mb-3">
                        <label class="mb-1 block text-sm font-medium text-zinc-300" for="provider-type-select">
                            Provider Type <span class="text-rose-400">*</span>
                        </label>
                        <select id="provider-type-select" class="w-full rounded-lg border border-zinc-700 bg-zinc-950 px-3 py-2 text-sm text-zinc-100 focus:border-[#fdaa02] focus:outline-none focus:ring-2 focus:ring-[#fdaa02]/25" onchange="onProviderTypeChange()">
                            <option value="">— select a provider —</option>
                        </select>
                    </div>
                </div>

                <!-- Step 2: instance name + settings fields -->
                <div id="step-settings" class="hidden">
                    <div class="mb-3">
                        <label class="mb-1 block text-sm font-medium text-zinc-300" for="config-display-name">
                            Display Name <span class="text-rose-400">*</span>
                        </label>
                        <input type="text" id="config-display-name" class="w-full rounded-lg border border-zinc-700 bg-zinc-950 px-3 py-2 text-sm text-zinc-100 placeholder:text-zinc-500 focus:border-[#fdaa02] focus:outline-none focus:ring-2 focus:ring-[#fdaa02]/25"
                               placeholder="e.g. Alert Emails">
                    </div>
                    <hr class="my-3">
                    <div id="dynamic-fields"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="rounded-lg border border-zinc-600 px-3 py-1.5 text-sm font-medium text-zinc-200 transition-colors hover:bg-zinc-800" data-bs-dismiss="modal">Cancel</button>
                <button type="button" id="btn-save" class="hidden rounded-lg bg-[#fdaa02] px-3 py-1.5 text-sm font-semibold text-black transition-colors hover:bg-[#e89a02]" onclick="saveConfig()">
                    <i class="fa-solid fa-save mr-1"></i>Save
                </button>
            </div>
        </div>
    </div>
</div>

<script src="/js/vork-modal.js" th:src="@{/js/vork-modal.js}"></script>
<script src="/js/notifications.js" th:src="@{/js/notifications.js}"></script>
</body>
</html>
