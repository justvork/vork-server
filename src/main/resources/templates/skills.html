<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skills — Vork</title>
    <link rel="icon" type="image/png" href="/images/Vork-Faviconx128.png" th:href="@{/images/Vork-Faviconx128.png}">
    <link rel="stylesheet" href="/css/tailwind.css" th:href="@{/css/tailwind.css}">
    <link rel="stylesheet" href="/packages/npm.fortawesome/fontawesome-free/current/css/all.min.css" th:href="@{/packages/npm.fortawesome/fontawesome-free/current/css/all.min.css}">
    <link rel="stylesheet" href="/css/vork.css" th:href="@{/css/vork.css}">
    <link rel="stylesheet" href="/css/skills.css" th:href="@{/css/skills.css}">
</head>
<body class="bg-zinc-950 text-zinc-100">
<div th:replace="~{fragments/header :: header}"></div>

<div class="container py-4" style="max-width: 1000px;">
    <div class="d-flex align-items-center justify-content-between mb-4">
        <div class="d-flex align-items-center gap-3">
            <a href="/index.html" th:href="@{/index.html}" class="btn btn-outline-secondary btn-sm" title="Back to Chat">
                <i class="fa-solid fa-arrow-left"></i>
            </a>
            <div>
                <h2 class="mb-0"><i class="fa-solid fa-bolt me-2"></i>Skills</h2>
                <p class="text-muted small mb-0">Reusable AI skill definitions with sandboxed execution</p>
            </div>
        </div>
        <div class="d-flex gap-2">
            <button class="btn btn-outline-secondary"
                    onclick="document.getElementById('import-file-input').click()"
                    title="Import a skill group from a JSON export file">
                <i class="fa-solid fa-file-import me-2"></i>Import
            </button>
            <input type="file" id="import-file-input" accept=".json"
                   style="display:none" onchange="importSkill(this)">
            <button class="btn btn-outline-info" onclick="openCreateGroup()">
                <i class="fa-solid fa-layer-group me-2"></i>New Group
            </button>
            <button class="btn btn-primary" onclick="openCreate()">
                <i class="fa-solid fa-plus me-2"></i>New Skill
            </button>
        </div>
    </div>

    <div id="alert-area" class="mb-3"></div>

    <!-- Group-first table -->
    <div class="card">
        <div class="card-body p-0">
            <div id="no-groups" class="text-center text-muted py-5 d-none">
                <i class="fa-solid fa-bolt fa-2x mb-3 d-block"></i>
                No skill groups defined yet.
            </div>
            <table id="group-table" class="table table-hover mb-0 align-middle d-none">
                <thead class="table-dark">
                    <tr>
                        <th>Group</th>
                        <th>Category</th>
                        <th>Skills</th>
                        <th>Author</th>
                        <th class="text-end">Actions</th>
                    </tr>
                </thead>
                <tbody id="group-table-body"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- ─── Create / Edit Modal ──────────────────────────────────────────────── -->
<div class="modal fade" id="skillModal" tabindex="-1" aria-labelledby="skillModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="skillModalLabel">New Skill</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="skill-id">
                <div id="skill-modal-alert" class="mb-3"></div>

                <div class="mb-3">
                    <label class="form-label" for="skill-name">Name <span class="text-danger">*</span></label>
                    <input type="text" id="skill-name" class="form-control" placeholder="e.g. Summarise Document">
                </div>

                <div class="mb-3">
                    <label class="form-label" for="skill-group">Group <span class="text-danger">*</span></label>
                    <select id="skill-group" class="form-select">
                        <option value="">— select a group —</option>
                    </select>
                </div>

                <div class="form-check form-switch mb-3">
                    <input class="form-check-input" type="checkbox" role="switch" id="skill-auto-share">
                    <label class="form-check-label" for="skill-auto-share">
                        Auto-share within group
                    </label>
                    <div class="form-text">
                        When enabled, this skill is automatically available as a sub-skill to other skills in the same group.
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label" for="skill-description">Description</label>
                    <input type="text" id="skill-description" class="form-control"
                           placeholder="Brief description of what this skill does">
                </div>

                <!-- Input Parameters ────────────────────────────────────── -->
                <div class="mb-3">
                    <label class="form-label">Input Parameters</label>
                    <div id="param-list" class="mb-2"></div>
                    <button type="button" class="btn btn-sm btn-outline-secondary" onclick="addParam()">
                        <i class="fa-solid fa-plus me-1"></i>Add Parameter
                    </button>
                </div>

                <div class="mb-3">
                    <label class="form-label" for="skill-instructions">Instructions</label>
                    <textarea id="skill-instructions" class="form-control font-monospace" rows="8"
                              placeholder="Detailed instructions for the AI: what to do, how to do it, constraints, output format…"></textarea>
                </div>

                <!-- Allowed Tools ─────────────────────────────────────────── -->
                <div class="mb-3">
                    <label class="form-label">Allowed Tools</label>
                    <div id="tool-pill-container" class="d-flex flex-wrap gap-1 mb-2 p-2 rounded border border-secondary" style="min-height: 40px;"></div>
                    <div class="input-group mb-1">
                        <span class="input-group-text"><i class="fa-solid fa-magnifying-glass"></i></span>
                        <input type="text" id="tool-search" class="form-control" placeholder="Search tools to add…" oninput="filterTools()">
                    </div>
                    <div id="tool-dropdown" class="card" style="max-height: 200px; overflow-y: auto; display: none;">
                        <ul id="tool-list" class="list-group list-group-flush"></ul>
                    </div>
                </div>

                <!-- Allowed Types ─────────────────────────────────────────── -->
                <div class="mb-3">
                    <label class="form-label">Allowed Types
                        <span class="text-muted small">(custom Java record types the skill may use)</span>
                    </label>
                    <div id="type-pill-container" class="d-flex flex-wrap gap-1 mb-2 p-2 rounded border border-secondary" style="min-height: 40px;"></div>
                    <div class="input-group mb-1">
                        <span class="input-group-text"><i class="fa-solid fa-cube"></i></span>
                        <input type="text" id="type-search" class="form-control" placeholder="Search types to add…" oninput="filterTypes()">
                    </div>
                    <div id="type-dropdown" class="card" style="max-height: 200px; overflow-y: auto; display: none;">
                        <ul id="type-list" class="list-group list-group-flush"></ul>
                    </div>
                </div>

                <!-- Sub-skills ──────────────────────────────────────────────── -->
                <div>
                    <label class="form-label">Sub-skills
                        <span class="text-muted small">(skills this skill may invoke — presented to the AI as tools during execution)</span>
                    </label>
                    <div id="subskill-pill-container" class="d-flex flex-wrap gap-1 mb-2 p-2 rounded border border-secondary" style="min-height: 40px;"></div>
                    <div class="input-group mb-1">
                        <span class="input-group-text"><i class="fa-solid fa-bolt"></i></span>
                        <input type="text" id="subskill-search" class="form-control" placeholder="Search sub-skills to add…" oninput="filterSubSkills()">
                    </div>
                    <div id="subskill-dropdown" class="card" style="max-height: 200px; overflow-y: auto; display: none;">
                        <ul id="subskill-list" class="list-group list-group-flush"></ul>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" id="btn-delete-skill" class="btn btn-outline-danger d-none" onclick="deleteCurrentSkillFromModal()">
                    <i class="fa-solid fa-trash me-1"></i>Delete Skill
                </button>
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" id="btn-save-skill" class="btn btn-primary" onclick="saveSkill()">
                    <i class="fa-solid fa-save me-1"></i>Save Skill
                </button>
            </div>
        </div>
    </div>
</div>

<!-- ─── Create / Edit Group Modal ───────────────────────────────────────── -->
<div class="modal fade" id="groupModal" tabindex="-1" aria-labelledby="groupModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="groupModalLabel">New Group</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="group-id">
                <div id="group-modal-alert" class="mb-3"></div>
                <div class="mb-3">
                    <label class="form-label" for="group-name">Name <span class="text-danger">*</span></label>
                    <input type="text" id="group-name" class="form-control" placeholder="e.g. Gmail Skills">
                </div>
                <div class="mb-3">
                    <label class="form-label" for="group-author">Author</label>
                    <input type="text" id="group-author" class="form-control" placeholder="Team or owner">
                </div>
                <div class="mb-0">
                    <label class="form-label" for="group-category">Category</label>
                    <input type="text" id="group-category" class="form-control" placeholder="e.g. Productivity">
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" id="btn-save-group" class="btn btn-primary" onclick="saveGroup()">
                    <i class="fa-solid fa-save me-1"></i>Save Group
                </button>
            </div>
        </div>
    </div>
</div>

<script src="/js/vork-modal.js" th:src="@{/js/vork-modal.js}"></script>
<script src="/js/skills.js" th:src="@{/js/skills.js}"></script>
</body>
</html>
